<!DOCTYPE html>
<html>
<head>
  <title>Money Manager</title>

  <style>
    /* ================= GLOBAL ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #6c63ff, #48c6ef);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1 {
      text-align: center;
      margin: 10px;
      color: #333;
    }

    /* ================= FLOATING MONEY EMOJI ================= */
    .money {
      position: fixed;
      font-size: 30px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* ================= CONTAINER ================= */
    .container {
      width: 95%;
      max-width: 900px;
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* ================= LOGIN ================= */
    #loginBox {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #6c63ff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #574fd6;
    }

    /* ================= APP ================= */
    #app {
      display: none;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    .card {
      flex: 1;
      min-width: 120px;
      background: #f4f6ff;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    /* ================= TABLE ================= */
    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #6c63ff;
      color: white;
    }

    /* ================= POPUP ================= */
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .form-box {
      background: white;
      padding: 20px;
      width: 90%;
      max-width: 300px;
      margin: 80px auto;
      border-radius: 10px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
    }

    /* ================= RESPONSIVE ================= */
    @media(max-width: 600px) {
      h1 {
        font-size: 20px;
      }

      .top-bar {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      table {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

<!-- 💰 FLOATING EMOJIS -->
<script>
for(let i=0;i<10;i++){
  let m = document.createElement("div");
  m.className = "money";
  m.innerText = "💰";
  m.style.left = Math.random()*100 + "vw";
  m.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(m);
}
</script>

<div class="container">

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Login / Signup</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

  <div class="top-bar">
    <h2>Welcome, <span id="userName"></span></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <h1>💰 Money Manager</h1>

  <div class="summary">
    <div class="card">Income ₹<span id="income">0</span></div>
    <div class="card">Expense ₹<span id="expense">0</span></div>
    <div class="card">Balance ₹<span id="balance">0</span></div>
  </div>

  <button onclick="openForm()">+ Add Transaction</button>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="form-box">
      <h2>Add Transaction</h2>

      <input type="number" id="amount" placeholder="Amount">
      <input type="date" id="date">

      <label><input type="radio" name="type" value="income"> Income</label>
      <label><input type="radio" name="type" value="expense"> Expense</label>

      <select id="category">
        <option value="">Select Category</option>
        <option>Salary</option>
        <option>Food</option>
        <option>Shopping</option>
        <option>Rent</option>
        <option>Others</option>
      </select>

      <input type="text" id="desc" placeholder="Description">

      <button onclick="addTransaction()">Save</button>
      <button onclick="closeForm()">Cancel</button>
    </div>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Category</th>
        <th>Description</th>
        <th>Amount</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>
</div>

<script>
// AUTH
function signup() {
  let user = username.value;
  let pass = password.value;

  if (!user || !pass) return alert("Enter all details");

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if (users.find(u => u.username === user)) {
    return alert("User exists!");
  }

  users.push({ username: user, password: pass });
  localStorage.setItem("users", JSON.stringify(users));
  alert("Signup successful!");
}

function login() {
  let user = username.value;
  let pass = password.value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let valid = users.find(u => u.username === user && u.password === pass);

  if (!valid) return alert("Invalid login");

  localStorage.setItem("currentUser", user);
  initApp();
}

function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

// APP
let currentUser;
let transactions = [];

function initApp() {
  currentUser = localStorage.getItem("currentUser");
  if (!currentUser) return;

  loginBox.style.display = "none";
  app.style.display = "block";
  userName.innerText = currentUser;

  transactions = JSON.parse(localStorage.getItem(currentUser)) || [];
  loadData();
}

function saveData() {
  localStorage.setItem(currentUser, JSON.stringify(transactions));
}

function loadData() {
  list.innerHTML = "";
  let income = 0, expense = 0;

  transactions.forEach(t => {
    list.innerHTML += `
      <tr>
        <td>${t.date}</td>
        <td>${t.type}</td>
        <td>${t.category}</td>
        <td>${t.desc}</td>
        <td>${t.amount}</td>
        <td><button onclick="deleteTxn(${t.id})">Delete</button></td>
      </tr>
    `;

    if (t.type === "income") income += +t.amount;
    else expense += +t.amount;
  });

  income.innerText = income;
  expense.innerText = expense;
  balance.innerText = income - expense;
}

function openForm() {
  popup.style.display = "block";
}

function closeForm() {
  popup.style.display = "none";
}

function addTransaction() {
  let amount = document.getElementById("amount").value;
  let date = document.getElementById("date").value;
  let type = document.querySelector('input[name="type"]:checked');
  let category = document.getElementById("category").value;
  let desc = document.getElementById("desc").value;

  if (!amount || !date || !type || !category) {
    return alert("Fill all fields");
  }

  transactions.push({
    id: Date.now(),
    amount,
    date,
    type: type.value,
    category,
    desc
  });

  saveData();
  loadData();
  closeForm();
}

function deleteTxn(id) {
  transactions = transactions.filter(t => t.id !== id);
  saveData();
  loadData();
}

window.onload = initApp;
</script>

</body>
</html>
